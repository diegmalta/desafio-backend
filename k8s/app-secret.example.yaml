# Exemplo de Secret para a API (apenas desenvolvimento / demonstração).
# Para produção: use kubectl create secret, External Secrets ou Sealed Secrets; não versionar segredos reais.
#
# Aplicar este ficheiro (valores fracos, só para smoke test local):
#   kubectl apply -f k8s/app-secret.example.yaml
#
# Ou criar à mão:
#   kubectl create secret generic app-secrets -n desafio-notif \
#     --from-literal=WEBHOOK_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=CPF_PEPPER="$(openssl rand -hex 32)" \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)"
#
# Chaves obrigatórias: WEBHOOK_SECRET, CPF_PEPPER, JWT_SECRET (ver .env.example).
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: desafio-notif
type: Opaque
stringData:
  WEBHOOK_SECRET: "k8s-dev-only-webhook-hmac-secret-min-32-chars________"
  CPF_PEPPER: "k8s-dev-only-cpf-pepper-distinct-from-webhook-32bytes__"
  JWT_SECRET: "k8s-dev-only-jwt-hs256-secret-32-bytes-minimum________"
