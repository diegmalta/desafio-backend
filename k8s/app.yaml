apiVersion: apps/v1
kind: Deployment
metadata:
  name: desafio-backend
  namespace: desafio-notif
  labels:
    app.kubernetes.io/name: desafio-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: desafio-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: desafio-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U notif -d notif; do sleep 2; done
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - until redis-cli -h redis ping; do sleep 2; done
      containers:
        - name: server
          image: desafio-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: DATABASE_URL
              value: "postgres://notif:notif@postgres:5432/notif?sslmode=disable"
            - name: REDIS_ADDR
              value: "redis:6379"
          envFrom:
            - secretRef:
                name: app-secrets
          startupProbe:
            httpGet:
              path: /ready
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
