# Rede nomeada explícita: evita falhas de DNS tipo "lookup postgres: no such host"
# no container `app` (Docker Desktop / alguns ambientes).
networks:
  backend:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notif
      POSTGRES_PASSWORD: notif
      POSTGRES_DB: notif
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif -d notif"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - backend

  app:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://notif:notif@postgres:5432/notif?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    networks:
      - backend

volumes:
  pgdata:
