services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notif
      POSTGRES_PASSWORD: notif
      POSTGRES_DB: notif
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif -d notif"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://notif:notif@postgres:5432/notif?sslmode=disable
      REDIS_ADDR: redis:6379
      # Apenas para desenvolvimento local em Docker; não usar em produção.
      WEBHOOK_SECRET: dev-webhook-secret-not-for-production-use-32b
      CPF_PEPPER: dev-cpf-pepper-not-for-production-use-32bytes
    ports:
      - "8080:8080"

volumes:
  pgdata:
